# re0 主配置示例。部署前将此文件复制为 config/re0.yaml 并填入真实值。
# 全部地址请使用内网地址；本文件不包含任何公网 URL。

llm:
  provider: vllm                                # OpenAI 兼容协议
  model: Qwen2.5-72B-Instruct
  base_url: http://llm.internal.example:8000/v1 # 由部署方填入内网 vLLM 地址
  api_key_env: VLLM_TOKEN                       # 若 vLLM 未开启鉴权，留空字符串即可
  timeout_s: 60
  temperature: 0
  max_tokens: 2048

db:
  type: mysql                                   # 或 http
  max_rows: 500
  query_timeout_s: 30
  mysql:
    host: mysql.internal.example
    port: 3306
    user: re0_ro
    password_env: DB_PASSWORD
    database: mes
    readonly: true
  http:
    url: http://sqlproxy.internal.example/execute
    method: POST
    auth_header_name: Authorization
    auth_header_env: SQL_PROXY_TOKEN
    timeout_s: 30

knowledge:
  schema_path: config/schema.example.yaml
  glossary_path: config/glossary.example.yaml

embedding:
  # 必须是内网可访问的本地目录（由运维预先同步权重）
  model_path: /opt/models/bge-small-zh-v1.5
  cache_dir: .re0_cache
  device: cpu
  max_seq_length: 256

memory:
  path: .re0_cache/memory.sqlite
  recall_threshold: 0.85
  top_k: 1

session:
  path: .re0_cache/sessions.sqlite
  max_turns: 30

runtime:
  offline_mode: true       # 开启后强制 HF_HUB_OFFLINE/TRANSFORMERS_OFFLINE
  max_agent_steps: 8
  log_level: INFO

skills:
  enabled:
    - sql_retrieval
